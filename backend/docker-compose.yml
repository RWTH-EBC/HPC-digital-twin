version: '3.8'

services:
  # One-shot provisioning of FIWARE entities/devices for the active
  # DEPLOYMENT_ENV. Remembers the last provisioned env in the fiware_state
  # volume: re-runs clean-and-create when the env changes, otherwise only
  # verifies all entities exist and re-runs clean-and-create if any is missing.
  # Assumes the iot-platform (Orion-LD / IoT-Agent) is already reachable.
  fiware-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/scripts/fiware_setup/clean_and_create.py
    environment:
      - DEPLOYMENT_ENV=${DEPLOYMENT_ENV:-local}
    volumes:
      - fiware_state:/opt/fiware_state
    restart: "no"

  data-publisher:
    build:
      context: .
      dockerfile: Dockerfile
    command: digital-twin --agent data_publisher
    environment:
      - DEPLOYMENT_ENV=${DEPLOYMENT_ENV:-local}
      - TIMESTEP=${TIMESTEP:-120}
    depends_on:
      fiware-init:
        condition: service_completed_successfully
    restart: unless-stopped

  preprocessing-agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: digital-twin --agent preprocessing_agent
    environment:
      - DEPLOYMENT_ENV=${DEPLOYMENT_ENV:-local}
      - TIMESTEP=${TIMESTEP:-120}
      - RUN_LIVE=${RUN_LIVE:-1}
    depends_on:
      fiware-init:
        condition: service_completed_successfully
    restart: unless-stopped

  coordinator:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn it_zauber_digital_twin.coordinator.api:create_app --host 0.0.0.0 --port 8000 --factory
    environment:
      - DEPLOYMENT_ENV=${DEPLOYMENT_ENV:-local}
      - TIMESTEP=${TIMESTEP:-10}
      - RUN_LIVE=${RUN_LIVE:-1}
      - ENABLE_JULIA_SETUP=true
      - JULIA_DEPOT_PATH=/opt/venv/julia_env/depot
    ports:
      - "8000:8000"
    volumes:
      - julia_env:/opt/venv/julia_env
    depends_on:
      fiware-init:
        condition: service_completed_successfully
    restart: unless-stopped

  state-saver:
    profiles:
      - itc
      - ebc
      - local
    build:
      context: .
      dockerfile: Dockerfile
    command: digital-twin --agent state_saver
    environment:
      - DEPLOYMENT_ENV=${DEPLOYMENT_ENV:-local}
      - COORDINATOR_URL=${COORDINATOR_URL:-http://coordinator:8000}
      - STATE_SAVE_INTERVAL_HOURS=${STATE_SAVE_INTERVAL_HOURS:-24}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      coordinator:
        condition: service_started
      fiware-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  julia_env:
  fiware_state:
